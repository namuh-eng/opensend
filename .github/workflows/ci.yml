# ABOUTME: CI guardrails — change-scoped lint/typecheck plus the documented onboarding acceptance flow.
name: CI

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main, staging]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  typecheck:
    name: Typecheck (full project)
    runs-on: ubuntu-latest
    env:
      SKIP_STAR_PROMPT: "1"
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: tsc --noEmit
        run: bunx tsc --noEmit --pretty false

  lint:
    name: Lint (change-scoped)
    runs-on: ubuntu-latest
    env:
      SKIP_STAR_PROMPT: "1"
    steps:
      - uses: actions/checkout@v5
        with:
          # scripts/check-changed-files.mjs needs origin/main history to compute the merge base.
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: bun run check
        run: bun run check

  tests:
    name: Unit tests (Vitest)
    runs-on: ubuntu-latest
    env:
      SKIP_STAR_PROMPT: "1"
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: bunx vitest run
        run: bunx vitest run

  migration-parity:
    name: Migration parity (prod migrator path)
    runs-on: ubuntu-latest
    env:
      SKIP_STAR_PROMPT: "1"
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare documented local env
        run: cp .env.example .env

      - name: Start documented local Postgres
        run: docker compose up postgres -d

      - name: Wait for Postgres
        # pg_isready alone races the initdb temp-server restart: it reports
        # ready, then the server shuts down to restart with the final config
        # ("FATAL: the database system is shutting down"). Require a real
        # query to succeed twice across a 2s gap before proceeding.
        run: |
          for i in $(seq 1 60); do
            if docker compose exec -T postgres psql -U opensend -d opensend -At -c 'SELECT 1' >/dev/null 2>&1; then
              sleep 2
              if docker compose exec -T postgres psql -U opensend -d opensend -At -c 'SELECT 1' >/dev/null 2>&1; then
                exit 0
              fi
            fi
            sleep 1
          done
          echo "Postgres did not become ready in time" >&2
          exit 1

      - name: Create comparison databases
        run: |
          docker compose exec -T postgres createdb -U opensend opensend_migrate
          docker compose exec -T postgres createdb -U opensend opensend_push

      # Production provisions the schema by replaying drizzle/*.sql via
      # src/lib/db/migrate.ts (the migrator ECS task). Dev/CI provision it via
      # drizzle-kit push, which applies schema.ts directly. If the two diverge
      # (e.g. the meta snapshot advanced without emitted DDL), only production
      # breaks. This job fails the build when the migration chain does not
      # reproduce schema.ts exactly.
      - name: Replay migrations via the production migrator entrypoint
        env:
          DATABASE_URL: postgresql://opensend:opensend@localhost:5432/opensend_migrate
        run: bun src/lib/db/migrate.ts

      - name: Apply schema.ts directly via drizzle-kit push
        env:
          DATABASE_URL: postgresql://opensend:opensend@localhost:5432/opensend_push
        run: bunx drizzle-kit push --config drizzle.config.ts --force

      - name: Assert migrated schema matches pushed schema
        run: |
          if ! bash scripts/check-migration-parity.sh opensend_migrate opensend_push \
            docker compose exec -T postgres psql -U opensend; then
            echo "::error title=Migration drift::Replaying drizzle/*.sql does not reproduce schema.ts. Production (which runs migrations) would diverge from dev (which uses db:push). Run 'bun run db:generate', inspect the emitted SQL, and commit it."
            exit 1
          fi

      - name: Tear down Docker services
        if: always()
        run: docker compose down -v


  php-sdk:
    name: PHP SDK tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none

      - name: Install PHP SDK dependencies
        working-directory: packages/php-sdk
        run: composer install --no-interaction --prefer-dist

      - name: Run PHP SDK tests
        working-directory: packages/php-sdk
        run: composer test

  jvm-sdk:
    name: JVM SDK tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run JVM SDK tests
        working-directory: packages/jvm-sdk
        run: mvn --batch-mode test

      - name: Compile JVM SDK Kotlin examples
        working-directory: packages/jvm-sdk
        run: mvn --batch-mode -Pkotlin-examples test-compile


  onboarding:
    name: Onboarding acceptance
    runs-on: ubuntu-latest
    env:
      SKIP_STAR_PROMPT: "1"
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare documented local env
        run: |
          cp .env.example .env
          node - <<'NODE'
          const fs = require("node:fs");
          const path = ".env";
          let env = fs.readFileSync(path, "utf8");

          function upsertEnv(name, value) {
            const pattern = new RegExp(`^#?\\s*${name}=.*$`, "m");
            const line = `${name}=${value}`;
            env = pattern.test(env) ? env.replace(pattern, line) : `${env}\n${line}\n`;
          }

          upsertEnv("DASHBOARD_KEY", "ci-test-key");
          upsertEnv("INGESTER_JOB_TOKEN", "ci-test-ingester-job-token-000000");
          fs.writeFileSync(path, env);
          NODE

      - name: Validate Docker Compose config
        run: docker compose config

      - name: Start documented local Postgres
        run: docker compose up postgres -d

      - name: Wait for Postgres
        run: until docker compose exec -T postgres pg_isready -U opensend >/dev/null 2>&1; do sleep 1; done

      - name: Push schema with documented local DATABASE_URL
        run: bunx drizzle-kit push --config drizzle.config.ts

      - name: Seed sample data
        run: bunx tsx scripts/seed.ts

      - name: Verify postinstall star prompt suppression regression
        run: bunx vitest run tests/postinstall-star.test.ts

      - name: Tear down Docker services
        if: always()
        run: docker compose down -v
