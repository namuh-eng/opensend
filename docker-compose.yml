# OpenSend self-host stack.
#
# Quick start:
#   1. cp .env.example .env
#   2. docker compose up -d
#
# .env.example includes local-only placeholders for BETTER_AUTH_SECRET,
# INGESTER_JOB_TOKEN, and WEBHOOK_SECRET_ENCRYPTION_KEY so the stack can boot
# for evaluation. Replace all three with generated secrets before any shared,
# staging, or production deploy.
#
# What this brings up:
#   - postgres   : Postgres 16 with the OpenSend schema, persisted in the named volume `pgdata`.
#   - redis      : Shared Redis for Compose rate limiting and hot-path cache coordination.
#   - migrate    : One-shot job that runs Drizzle migrations and exits.
#   - app        : Next.js dashboard + REST API on http://localhost:${PORT:-3015}.
#   - ingester   : Production Bun/Hono service that handles SES/SNS, Stripe, and scheduled-email
#                  webhooks on http://localhost:${INGESTER_PORT:-3016}.
#   - scheduler  : Durable short-interval driver for ingester /jobs/* scans.
#
# Optional profile:
#   - smtp-relay : `docker compose --profile smtp up -d smtp-relay` publishes SMTP on ${SMTP_RELAY_PORT:-2587}.
#
# Optional overrides (all read from .env):
#   - PORT                        : host port for the app (default 3015)
#   - INGESTER_PORT               : host port for the ingester (default 3016)
#   - POSTGRES_PORT               : host port for Postgres (default 5432)
#   - POSTGRES_PASSWORD           : Postgres password (REQUIRED; set in .env before `docker compose up`)
#   - REDIS_URL                   : Redis URL for app/ingester (default redis://redis:6379 in Compose)
#   - RATE_LIMIT_BACKEND          : app rate-limit backend (default redis in Compose)
#   - OPENSEND_APP_REPLICAS       : expected app replica count for startup warnings (default 1)
#   - SMTP_RELAY_PORT             : host/container port for the smtp profile (default 2587)
#   - BETTER_AUTH_SECRET          : required Better Auth session secret for app/ingester.
#   - AWS_*                       : SES + S3 credentials. If unset, email sending is disabled.
#   - BACKGROUND_JOBS_*           : SQS/EventBridge wiring for async send pipeline.
#   - INGESTER_JOB_TOKEN          : required bearer token protecting ingester /jobs/* scans.
#   - WEBHOOK_SECRET_ENCRYPTION_KEY: required encryption key for webhook signing secrets.
#   - INGESTER_SCHEDULER_INTERVAL_SECONDS: scheduler cadence (default 60; minimum 10).
#   - CLOUDFLARE_API_TOKEN/ZONE_ID: enables auto-DKIM/SPF/DMARC when adding a domain.
#   - S3_BUCKET_NAME              : S3 bucket for email attachments.
#
# To wipe the local database and start fresh:
#   docker compose down -v

name: opensend-staging

services:
  # Postgres 16. Data lives in the `pgdata` named volume so it survives `docker compose down`.
  # Use `docker compose down -v` to also remove the volume.
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: opensend
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env (see .env.example)}
      POSTGRES_DB: opensend
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opensend"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis coordinates rate limiting across app replicas and backs hot-path caches.
  # Compose uses plain redis:// on the private Docker network; managed production
  # Redis should use a private TLS endpoint (rediss://...).
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Runs Drizzle migrations once against Postgres and exits. The `app` and `ingester`
  # services wait for this to complete successfully before starting.
  migrate:
    build:
      context: .
      target: migrator
    environment:
      DATABASE_URL: postgresql://opensend:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env (see .env.example)}@postgres:5432/opensend
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # Next.js dashboard and REST API. Container listens on 8080; published to ${PORT:-3015}
  # on the host. AWS_* and CLOUDFLARE_* are optional — leave unset for a basic local stack.
  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    ports:
      - "${PORT:-3015}:8080"
    environment:
      DATABASE_URL: postgresql://opensend:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env (see .env.example)}@postgres:5432/opensend
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET in .env (local placeholder ok only for dev; generate a real secret for production)}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3015}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3015}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      BACKGROUND_JOBS_QUEUE_URL: ${BACKGROUND_JOBS_QUEUE_URL:-}
      BACKGROUND_JOBS_EVENT_BUS_NAME: ${BACKGROUND_JOBS_EVENT_BUS_NAME:-}
      BACKGROUND_JOBS_REQUIRE_QUEUE: ${BACKGROUND_JOBS_REQUIRE_QUEUE:-false}
      RATE_LIMIT_BACKEND: ${RATE_LIMIT_BACKEND:-redis}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      OPENSEND_APP_REPLICAS: ${OPENSEND_APP_REPLICAS:-1}
      WEBHOOK_SECRET_ENCRYPTION_KEY: ${WEBHOOK_SECRET_ENCRYPTION_KEY:?Set WEBHOOK_SECRET_ENCRYPTION_KEY in .env (local placeholder ok only for dev; generate a real secret for production)}
      INGESTER_HEALTH_URL: ${INGESTER_HEALTH_URL:-http://ingester:3016/health}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
      CLOUDFLARE_ZONE_ID: ${CLOUDFLARE_ZONE_ID:-}
      # Hosted billing/paywall cutover. Self-host/local stacks leave BILLING_BACKEND
      # unset or disabled and keep Stripe keys empty. Never commit real Stripe secrets.
      BILLING_BACKEND: ${BILLING_BACKEND:-disabled}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Production Bun/Hono service for inbound webhooks (SES bounces/complaints, Stripe billing
  # events, scheduled-email worker). Point your SES SNS topic and Stripe webhook at:
  #   http://<host>:${INGESTER_PORT:-3016}/events/ses
  #   http://<host>:${INGESTER_PORT:-3016}/webhooks/stripe
  # Set BACKGROUND_WORKER_POLL=true to enable the SQS long-poll loop in this container.
  ingester:
    image: opensend-ingester:local
    build:
      context: .
      dockerfile: packages/ingester/Dockerfile
    restart: unless-stopped
    ports:
      - "${INGESTER_PORT:-3016}:3016"
    environment:
      DATABASE_URL: postgresql://opensend:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env (see .env.example)}@postgres:5432/opensend
      PORT: 3016
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      BACKGROUND_JOBS_QUEUE_URL: ${BACKGROUND_JOBS_QUEUE_URL:-}
      BACKGROUND_JOBS_EVENT_BUS_NAME: ${BACKGROUND_JOBS_EVENT_BUS_NAME:-}
      BACKGROUND_JOBS_REQUIRE_QUEUE: ${BACKGROUND_JOBS_REQUIRE_QUEUE:-false}
      BACKGROUND_WORKER_POLL: ${BACKGROUND_WORKER_POLL:-false}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET in .env (local placeholder ok only for dev; generate a real secret for production)}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3015}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3015}
      WEBHOOK_SECRET_ENCRYPTION_KEY: ${WEBHOOK_SECRET_ENCRYPTION_KEY:?Set WEBHOOK_SECRET_ENCRYPTION_KEY in .env (local placeholder ok only for dev; generate a real secret for production)}
      INGESTER_JOB_TOKEN: ${INGESTER_JOB_TOKEN:?Set INGESTER_JOB_TOKEN in .env (32+ chars)}
      INGESTER_INBOUND_TOKEN: ${INGESTER_INBOUND_TOKEN:-}
      # Stripe billing webhook cutover. STRIPE_SECRET_KEY is passed for hosted
      # parity with the app even though webhook verification only uses STRIPE_WEBHOOK_SECRET today.
      BILLING_BACKEND: ${BILLING_BACKEND:-disabled}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      BILLING_NOTIFICATION_FROM_EMAIL: ${BILLING_NOTIFICATION_FROM_EMAIL:-}
      STRIPE_OVERAGE_METER_EVENT_NAME: ${STRIPE_OVERAGE_METER_EVENT_NAME:-}
      # Uses the same Compose Redis as the app for domain-cache invalidation.
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://127.0.0.1:3016/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Optional SMTP compatibility relay. It is profile-gated so the default
  # Compose footprint remains app + ingester + scheduler + data services.
  # Enable with: docker compose --profile smtp up -d smtp-relay
  smtp-relay:
    profiles: ["smtp"]
    image: opensend-smtp-relay:local
    build:
      context: .
      dockerfile: packages/smtp-relay/Dockerfile
    restart: unless-stopped
    ports:
      - "${SMTP_RELAY_PORT:-2587}:${SMTP_RELAY_PORT:-2587}"
    environment:
      DATABASE_URL: postgresql://opensend:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env (see .env.example)}@postgres:5432/opensend
      AWS_REGION: ${AWS_REGION:-us-east-1}
      BACKGROUND_JOBS_QUEUE_URL: ${BACKGROUND_JOBS_QUEUE_URL:-}
      SMTP_RELAY_HOST: ${SMTP_RELAY_HOST:-0.0.0.0}
      SMTP_RELAY_PORT: ${SMTP_RELAY_PORT:-2587}
      SMTP_RELAY_TLS_CERT_PATH: ${SMTP_RELAY_TLS_CERT_PATH:-}
      SMTP_RELAY_TLS_KEY_PATH: ${SMTP_RELAY_TLS_KEY_PATH:-}
      SMTP_RELAY_MAX_MESSAGE_SIZE_BYTES: ${SMTP_RELAY_MAX_MESSAGE_SIZE_BYTES:-41943040}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # Durable local/self-host scheduler for ingester background scan endpoints.
  # It posts every ${INGESTER_SCHEDULER_INTERVAL_SECONDS:-60}s to:
  #   - /jobs/scheduled-emails
  #   - /jobs/webhooks
  #   - /jobs/domain-verify
  #   - /jobs/billing-overage
  # The scheduler sends Authorization: Bearer <INGESTER_JOB_TOKEN>.
  scheduler:
    image: opensend-ingester:local
    restart: unless-stopped
    command: ["bun", "/app/job-scheduler.js"]
    environment:
      INGESTER_URL: http://ingester:3016
      INGESTER_JOB_TOKEN: ${INGESTER_JOB_TOKEN:?Set INGESTER_JOB_TOKEN in .env (32+ chars)}
      INGESTER_SCHEDULER_INTERVAL_SECONDS: ${INGESTER_SCHEDULER_INTERVAL_SECONDS:-60}
    depends_on:
      ingester:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
