# OpenSend self-host stack.
#
# Quick start:
#   1. cp .env.example .env  (then fill in the required keys)
#   2. docker compose up -d
#
# What this brings up:
#   - postgres   : Postgres 16 with the OpenSend schema, persisted in the named volume `pgdata`.
#   - migrate    : One-shot job that runs Drizzle migrations and exits.
#   - app        : Next.js dashboard + REST API on http://localhost:${PORT:-3015}.
#   - ingester   : Production Bun/Hono service that handles SES/SNS, Stripe, and scheduled-email
#                  webhooks on http://localhost:${INGESTER_PORT:-3016}.
#                  Experimental Go shadow skeleton lives at services/ingester-go
#                  and defaults to 3027, but is intentionally not wired into Compose.
#
# Optional overrides (all read from .env):
#   - PORT                        : host port for the app (default 3015)
#   - INGESTER_PORT               : host port for the ingester (default 3016)
#   - POSTGRES_PORT               : host port for Postgres (default 5432)
#   - POSTGRES_PASSWORD           : Postgres password (default `opensend`; CHANGE in production)
#   - AWS_*                       : SES + S3 credentials. If unset, email sending is disabled.
#   - BACKGROUND_JOBS_*           : SQS/EventBridge wiring for async send pipeline.
#   - CLOUDFLARE_API_TOKEN/ZONE_ID: enables auto-DKIM/SPF/DMARC when adding a domain.
#   - S3_BUCKET_NAME              : S3 bucket for email attachments.
#
# To wipe the local database and start fresh:
#   docker compose down -v

name: opensend-staging

services:
  # Postgres 16. Data lives in the `pgdata` named volume so it survives `docker compose down`.
  # Use `docker compose down -v` to also remove the volume.
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: opensend
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opensend}
      POSTGRES_DB: opensend
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opensend"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Runs Drizzle migrations once against Postgres and exits. The `app` and `ingester`
  # services wait for this to complete successfully before starting.
  migrate:
    build:
      context: .
      target: migrator
    environment:
      DATABASE_URL: postgresql://opensend:${POSTGRES_PASSWORD:-opensend}@postgres:5432/opensend
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # Next.js dashboard and REST API. Container listens on 8080; published to ${PORT:-3015}
  # on the host. AWS_* and CLOUDFLARE_* are optional — leave unset for a basic local stack.
  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    ports:
      - "${PORT:-3015}:8080"
    environment:
      DATABASE_URL: postgresql://opensend:${POSTGRES_PASSWORD:-opensend}@postgres:5432/opensend
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      BACKGROUND_JOBS_QUEUE_URL: ${BACKGROUND_JOBS_QUEUE_URL:-}
      BACKGROUND_JOBS_EVENT_BUS_NAME: ${BACKGROUND_JOBS_EVENT_BUS_NAME:-}
      BACKGROUND_JOBS_REQUIRE_QUEUE: ${BACKGROUND_JOBS_REQUIRE_QUEUE:-false}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
      CLOUDFLARE_ZONE_ID: ${CLOUDFLARE_ZONE_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Production Bun/Hono service for inbound webhooks (SES bounces/complaints, Stripe billing
  # events, scheduled-email worker). The Go ingester skeleton under services/ingester-go
  # is experimental/shadow-only and must not receive production traffic yet. Point your SES SNS topic and Stripe webhook at:
  #   http://<host>:${INGESTER_PORT:-3016}/events/ses
  #   http://<host>:${INGESTER_PORT:-3016}/events/stripe
  # Set BACKGROUND_WORKER_POLL=true to enable the SQS long-poll loop in this container.
  ingester:
    build:
      context: .
      dockerfile: packages/ingester/Dockerfile
    restart: unless-stopped
    ports:
      - "${INGESTER_PORT:-3016}:3016"
    environment:
      DATABASE_URL: postgresql://opensend:${POSTGRES_PASSWORD:-opensend}@postgres:5432/opensend
      PORT: 3016
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      BACKGROUND_JOBS_QUEUE_URL: ${BACKGROUND_JOBS_QUEUE_URL:-}
      BACKGROUND_JOBS_EVENT_BUS_NAME: ${BACKGROUND_JOBS_EVENT_BUS_NAME:-}
      BACKGROUND_JOBS_REQUIRE_QUEUE: ${BACKGROUND_JOBS_REQUIRE_QUEUE:-false}
      BACKGROUND_WORKER_POLL: ${BACKGROUND_WORKER_POLL:-false}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://127.0.0.1:3016/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pgdata:
