[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "opensend"
version = "0.1.0"
description = "Python SDK for the OpenSend email API"
readme = "README.md"
requires-python = ">=3.9"
license = "Elastic-2.0"
authors = [{ name = "OpenSend" }]
keywords = ["email", "api", "sdk", "resend", "opensend"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Typing :: Typed",
]

[project.urls]
Homepage = "https://github.com/namuh-eng/opensend"
Repository = "https://github.com/namuh-eng/opensend"
Issues = "https://github.com/namuh-eng/opensend/issues"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
opensend = ["py.typed"]
